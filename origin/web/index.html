<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IFC MVP</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { height: 100vh; display: grid; grid-template-columns: 360px 1fr; grid-template-rows: 1fr; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #left { padding: 16px; border-right: 1px solid #ddd; box-sizing: border-box; }
    #viewer { position: relative; height: 100%; }
    #canvas { width: 100%; height: 100%; display: block; }
    textarea { width: 100%; height: 160px; box-sizing: border-box; }
    button { width: 100%; padding: 10px 12px; margin-top: 8px; }
    .row { margin-top: 10px; font-size: 14px; }
    .muted { color: #666; font-size: 12px; }
    #status { white-space: pre-wrap; }
    a { word-break: break-all; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js",
        "three/examples/jsm/utils/BufferGeometryUtils": "https://unpkg.com/three@0.160.0/examples/jsm/utils/BufferGeometryUtils.js",
        "web-ifc": "https://unpkg.com/web-ifc@0.0.77/web-ifc-api.js"
      }
    }
  </script>
</head>
<body>
  <div id="left">
    <h2 style="margin:0 0 12px 0;">IFC MVP</h2>
    <div class="muted">프롬프트 → IFC 생성/수정(현재는 생성) → 3D 확인 → 다운로드</div>

    <div class="row">
      <label for="prompt"><b>프롬프트</b></label>
      <textarea id="prompt" placeholder="예: 12x9x3.2 박스 건물 만들어줘\n또는: width=15 depth=10 height=4 wall=0.25"></textarea>
      <label class="muted" style="display:flex; gap:8px; align-items:center; margin-top:8px;">
        <input id="use_llm" type="checkbox" checked />
        LLM로 요구사항 해석(추천)
      </label>
      <label class="muted" style="display:flex; gap:8px; align-items:center; margin-top:6px;">
        <input id="apply_to_existing" type="checkbox" disabled />
        기존 도면에 적용(수정)
      </label>
      <button id="btn">생성/수정 실행</button>
    </div>

    <div class="row">
      <b>결과</b>
      <div id="status" class="muted">대기중</div>
      <div id="links" style="margin-top: 8px;"></div>
    </div>

    <div class="row muted">
      지원 키워드: width/가로/폭, depth/세로/깊이, height/높이/층고, wall/벽두께, slab/바닥
    </div>
  </div>

  <div id="viewer">
    <canvas id="canvas"></canvas>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
    import { IFCLoader } from 'https://unpkg.com/web-ifc-three@0.0.126/IFCLoader.js';

    const canvas = document.getElementById('canvas');
    const statusEl = document.getElementById('status');
    const linksEl = document.getElementById('links');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf6f7fb);

    const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 5000);
    camera.position.set(12, 10, 8);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio || 1);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(10, 20, 10);
    scene.add(dir);

    const grid = new THREE.GridHelper(50, 50, 0xcccccc, 0xdddddd);
    scene.add(grid);

    const ifcLoader = new IFCLoader();
    await ifcLoader.ifcManager.setWasmPath('https://unpkg.com/web-ifc@0.0.77/');

    let currentModel = null;
    let lastFileId = localStorage.getItem('lastFileId') || null;
    const applyBox = document.getElementById('apply_to_existing');
    if (lastFileId) {
      applyBox.disabled = false;
      applyBox.checked = true;
    }

    function resize() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    window.addEventListener('resize', resize);
    resize();

    function frame() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(frame);
    }
    frame();

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function fitToObject(object3d) {
      const box = new THREE.Box3().setFromObject(object3d);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = camera.fov * (Math.PI / 180);
      let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
      cameraZ *= 1.4;

      camera.position.set(center.x + cameraZ, center.y + cameraZ, center.z + cameraZ * 0.6);
      camera.near = Math.max(0.01, maxDim / 1000);
      camera.far = Math.max(1000, maxDim * 10);
      camera.updateProjectionMatrix();

      controls.target.copy(center);
      controls.update();
    }

    async function generate() {
      linksEl.innerHTML = '';
      setStatus('생성 중...');

      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) {
        setStatus('프롬프트를 입력하세요.');
        return;
      }

      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt,
          use_llm: document.getElementById('use_llm').checked,
          base_file_id: (lastFileId && document.getElementById('apply_to_existing').checked) ? lastFileId : null
        })
      });

      if (!res.ok) {
        const t = await res.text();
        setStatus('서버 오류(' + res.status + '): ' + t);
        return;
      }

      const data = await res.json();
      lastFileId = data.file_id;
      localStorage.setItem('lastFileId', lastFileId);
      applyBox.disabled = false;
      applyBox.checked = true;
      const llmUsed = data?.parsed?.llm_used;
      const llmErr = data?.parsed?.llm_error;
      const llmData = data?.llm;
      let msg = '완료\n' + JSON.stringify(data.parsed, null, 2);
      msg += '\n\n[설계 상태] last_file_id=' + lastFileId;
      if (llmUsed) {
        msg += '\n\n[LLM 해석]';
        msg += '\n' + JSON.stringify(llmData, null, 2);
      } else if (llmErr) {
        msg += '\n\n[LLM 실패] ' + llmErr;
      }
      setStatus(msg);

      const viewUrl = data.file_url;
      const dlUrl = data.download_url;

      const a1 = document.createElement('a');
      a1.href = dlUrl;
      a1.textContent = 'IFC 다운로드';
      a1.download = data.file_id + '.ifc';
      linksEl.appendChild(a1);

      linksEl.appendChild(document.createElement('div'));

      const a2 = document.createElement('a');
      a2.href = viewUrl;
      a2.textContent = 'IFC 원본 URL 열기';
      a2.target = '_blank';
      linksEl.appendChild(a2);

      // Load IFC into viewer
      if (currentModel) {
        scene.remove(currentModel);
        currentModel = null;
      }

      setStatus(statusEl.textContent + '\n3D 로딩 중...');

      try {
        const model = await new Promise((resolve, reject) => {
          ifcLoader.load(viewUrl, (ifcModel) => resolve(ifcModel), undefined, (err) => reject(err));
        });
        currentModel = model;
        scene.add(model);
        fitToObject(model);
        setStatus(statusEl.textContent + '\n3D 로딩 완료');
      } catch (e) {
        console.error(e);
        setStatus(statusEl.textContent + '\n3D 로딩 실패: ' + (e?.message || String(e)));
      }
    }

    document.getElementById('btn').addEventListener('click', () => {
      generate().catch((e) => setStatus('오류: ' + (e?.message || String(e))));
    });
  </script>
</body>
</html>
