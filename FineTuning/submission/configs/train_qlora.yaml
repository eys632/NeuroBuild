model:
  name_or_path: Qwen/Qwen2.5-Coder-7B-Instruct
  fallback_name_or_path: Qwen/Qwen2.5-7B-Instruct

data:
  train_messages: data/train_messages.jsonl
  valid_messages: data/valid_messages.jsonl
  messages_field: messages
  system_prompt_path: configs/delta_system_prompt.txt

sft:
  max_seq_len: 2048
  packing: false

quantization:
  load_in_4bit: false
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16

peft:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: checkpoints/qlora_smoke
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_train_epochs: 1
  max_steps: 100
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 50
  eval_steps: 50
  save_total_limit: 2
  seed: 42
  bf16: true
  tf32: true
  gradient_checkpointing: true
